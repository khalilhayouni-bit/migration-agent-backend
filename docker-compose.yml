version: '3.8'

services:
  migration-backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
    volumes:
      - chroma_db:/app/chroma_db
      - migration_outputs:/app/app/outputs
    restart: unless-stopped

volumes:
  chroma_db:
  migration_outputs:
